name: Attendx CI/CD Pipeline

# 1. When should this pipeline run?
on:
  push:
    branches: [ "main" ]      # Runs on direct pushes to main
  pull_request:
    branches: [ "main" ]      # Runs when a PR is opened against main

jobs:
  # ─── JOB 1: RUN UNIT TESTS ──────────────────────────────────────────
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'  # Change this to match your Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm install             # 'npm ci' is strictly for automated environments

      - name: Run Tests
        run: npm test           # Executes your Jest tests

  # ─── JOB 2: DEPLOY TO RENDER ────────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: test                 # CRITICAL: This waits for the 'test' job to pass!
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"